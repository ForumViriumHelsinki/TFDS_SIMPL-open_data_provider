{{- if .Values.singleNode }}
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: tier2-gateway-passthrough
  namespace: {{ .Values.cluster.namespace }}
  annotations:
    # This is the magic line that tells Nginx to stream raw TCP to tier2_gateway
    # allowing it to verify the mTLS Participant Credential.
    nginx.ingress.kubernetes.io/ssl-passthrough: "true"
spec:
  ingressClassName: nginx
  tls:
  - hosts:
    - tls.participant.{{ .Values.namespaceTag.dataprovider }}.{{ .Values.domainSuffix }}
  rules:
  - host: tls.participant.{{ .Values.namespaceTag.dataprovider }}.{{ .Values.domainSuffix }}
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: tier2-gateway
            port:
              number: 443
{{- end }}
